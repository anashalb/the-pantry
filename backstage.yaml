apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service
  description: Authentication service for secure payments, supporting OAuth, JWT, and multi-factor authentication.
  annotations:
    github.com/project-slug: my-org/authentication-service
    backstage.io/kubernetes-label-selector: "app=authentication-service"
    backstage.io/techdocs-ref: dir:.
  tags:
    - authentication
    - payments
    - security
    - grpc
    - rabbitmq
    - async
spec:
  type: service
  owner: payments-team
  lifecycle: production
  providesApis:
    - authentication-api
    - authentication-grpc
  consumesApis:
    - api-gateway
    - transaction-api
    - user-account-api
    - fraud-detection-api
    - notification-api
  dependsOn:
    - component:user-account-service
    - component:transaction-service
    - component:fraud-detection-service
    - resource:rabbitmq

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: api-gateway
  description: API Gateway for routing external and internal service calls.
spec:
  type: service
  owner: platform-team
  lifecycle: production
  providesApis:
    - api-gateway
  dependsOn:
    - component:frontend
    - component:authentication-service
    - component:transaction-service
    - component:user-account-service
    - component:fraud-detection-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: frontend
  description: Web frontend for authentication and payments.
spec:
  type: website
  owner: frontend-team
  lifecycle: production
  dependsOn:
    - component:api-gateway

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: transaction-service
  description: Manages payment transactions and history.
spec:
  type: service
  owner: payments-team
  lifecycle: production
  providesApis:
    - transaction-api
  dependsOn:
    - resource:postgres
    - resource:rabbitmq

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: user-account-service
  description: Manages user accounts and payment credentials.
spec:
  type: service
  owner: identity-team
  lifecycle: production
  providesApis:
    - user-account-api
  dependsOn:
    - resource:postgres

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fraud-detection-service
  description: Uses AI/ML models to detect fraud in transactions.
spec:
  type: service
  owner: security-team
  lifecycle: production
  providesApis:
    - fraud-detection-api
  dependsOn:
    - resource:rabbitmq
    - resource:ml-engine

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: notification-service
  description: Sends email, SMS, and push notifications for authentication and transactions.
spec:
  type: service
  owner: platform-team
  lifecycle: production
  providesApis:
    - notification-api
  dependsOn:
    - component:email-service
    - component:sms-service
    - component:push-service
    - resource:rabbitmq

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: email-service
  description: Handles email notifications.
spec:
  type: service
  owner: platform-team
  lifecycle: production
  providesApis:
    - email-api
  dependsOn:
    - component:email-queue

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: sms-service
  description: Handles SMS notifications.
spec:
  type: service
  owner: platform-team
  lifecycle: production
  providesApis:
    - sms-api
  dependsOn:
    - component:sms-gateway

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: push-service
  description: Handles push notifications.
spec:
  type: service
  owner: platform-team
  lifecycle: production
  providesApis:
    - push-api
  dependsOn:
    - component:push-dispatcher

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: email-queue
  description: Queue for processing email notifications.
spec:
  type: queue
  owner: infra-team
  lifecycle: production
  dependsOn:
    - component:email-logging

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: sms-gateway
  description: Gateway for sending SMS notifications.
spec:
  type: service
  owner: infra-team
  lifecycle: production
  providesApis:
    - sms-gateway-api
  dependsOn:
    - component:sms-analytics

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: push-dispatcher
  description: Dispatcher for push notifications.
spec:
  type: service
  owner: infra-team
  lifecycle: production
  providesApis:
    - push-dispatcher-api
  dependsOn:
    - component:push-analytics

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: email-logging
  description: Logs all outgoing emails for tracking.
spec:
  type: service
  owner: analytics-team
  lifecycle: production
  providesApis:
    - email-logging-api

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: sms-analytics
  description: Analyzes SMS performance and delivery rates.
spec:
  type: service
  owner: analytics-team
  lifecycle: production
  providesApis:
    - sms-analytics-api

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: push-analytics
  description: Analyzes push notification engagement and performance.
spec:
  type: service
  owner: analytics-team
  lifecycle: production
  providesApis:
    - push-analytics-api

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: rabbitmq
  description: RabbitMQ message broker for async communication.
spec:
  type: queue
  owner: infra-team
  lifecycle: production

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: postgres
  description: PostgreSQL database for user accounts and transactions.
spec:
  type: database
  owner: infra-team
  lifecycle: production

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: ml-engine
  description: Machine learning engine for fraud detection.
spec:
  type: ml-model
  owner: security-team
  lifecycle: production
